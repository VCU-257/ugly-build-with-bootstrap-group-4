<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
         /* Main app container (centered box like a mobile app) */
        .app-container { 
            width: 100%;           /* Added: Full width on mobile */
            max-width: 450px;      /* Updated: slightly wider for better desktop flow */
            margin: 0 auto;        /* Centers horizontally */
            border: 1px solid #ddd; 
            min-height: 100vh; 
            background: #fff; 
        }

        /* Responsive: Removes border on small screens for a seamless mobile look */
        @media (max-width: 576px) {
            .app-container {
                border: none;
            }
        }

        .form-input-gray { 
            background-color: #e9ecef; 
            border: none; 
            height: 50px; 
        }
         /* Placeholder box for an icon */
        .icon-box { 
            width: 50px; 
            height: 50px; 
            background-color: #d3d3d3; 
            flex-shrink: 0;         /* Added: prevents icon from squishing on tiny screens */
        }
       /* Custom light gray button */
        .btn-light-grey {
            background-color: #d9d9d9;
            border: none;
            color: #333;
        }
         /* Darker gray when hovering over button */
        .btn-light-grey:hover {
            background-color: #cccccc;
        }
    </style>
</head>
<body class="bg-light">
<div class="app-container d-flex flex-column">
    
    <div class="p-4">
        <div class="d-flex align-items-center mb-4 mt-2">
            <div class="icon-box me-3"></div>
            <h4 class="mb-0 fw-bold">ADD NEW TASK</h4>
        </div>
 <div class="alert alert-danger d-none" role="alert">
    Please fill out all required fields correctly.
    </div>

        <form>
             <div class="mb-4">
                <label class="form-label small fw-bold">Task Name:</label>
                <input type="text" class="form-control form-input-gray">
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Due Date:</label>
                <input type="date" class="form-control form-input-gray">
            </div>
            <div class="mb-5">
                <label class="form-label small fw-bold">Priority</label>
                <select class="form-select form-input-gray">
                    <option selected disabled></option>
                    <option value="1">Low</option>
                    <option value="2">Medium</option>
                    <option value="3">High</option>
                </select>
            </div>
             <div class="d-grid gap-3 text-center">
                 <button type="submit" class="btn btn-secondary py-2 w-100">Submit</button>
                 <button type="button" class="btn btn-light-grey py-2 w-100">cancel</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
