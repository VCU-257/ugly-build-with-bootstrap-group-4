<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Customization -->
    <style>
        body {
            background-color: #f8f9fa;
            padding-bottom: 2rem;
        }

        .form-input-gray { 
            background-color: #e9ecef; 
            border: none; 
            height: 50px; 
        }

        .icon-box { 
            width: 50px; 
            height: 50px; 
            background-color: #d3d3d3; 
        }

       .btn-light-grey {
            background-color: #bcbcbc !important; 
            border: none !important;
            color: #333 !important;
        }

        .btn-light-grey:hover {
            background-color: #a1a1a1 !important;
            color: #000 !important;
        }

        .form-wrapper {
            width: 100%;
            margin: 3rem auto; 
            background-color: #ffffff;
            padding: 2rem;
            border-radius: 10px;
        }

        @media (min-width: 768px) {
            .form-wrapper {
                max-width: 700px; 
                box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div id="navbar"></div>
    
    <script>
        fetch("./navigation/navbar.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;
            });
    </script>

    <div class="container">
        <div class="form-wrapper">
            <div class="d-flex align-items-center mb-4">
                <div class="icon-box me-3 rounded"></div>
                <h2 class="mb-0 fw-bold">ADD NEW TASK</h2>
            </div>

            <hr class="mb-5">

            <!-- Task name form -->
            <form id="taskForm" class="needs-validation" novalidate>
                <div class="row">
                    <div class="col-12 mb-4">
                        <label class="form-label small fw-bold text-uppercase">Task Name:</label>
                        <input type="text" class="form-control form-input-gray" placeholder="Enter task name" required>
                    </div>
                    
                    <!-- Due date form -->
                    <div class="col-md-6 mb-4">
                        <label class="form-label small fw-bold text-uppercase">Due Date:</label>
                        <input type="date" class="form-control form-input-gray" required>
                    </div>
                    
                    <!-- Priorities -->
                    <div class="col-md-6 mb-4">
                        <label class="form-label small fw-bold text-uppercase">Priority</label>
                        <select class="form-select form-input-gray" required>
                            <option selected disabled value="">Select priority</option>
                            <option value="1">Low</option>
                            <option value="2">Medium</option>
                            <option value="3">High</option>
                        </select>
                    </div>
                </div>
                <!-- Submit and cancel buttons -->
                <div class="d-flex flex-column flex-md-row gap-3 mt-4">
                    <button type="submit" class="btn btn-secondary px-5 py-3 fw-bold flex-grow-1">SUBMIT</button>
                    <button type="button" class="btn btn-light-grey px-5 py-3 fw-bold flex-grow-1">CANCEL</button>
                </div>
            </form>
        </div>
    </div>
<!-- Modal alert fixed -->
    <div class="modal fade" id="validationModal" tabindex="-1" aria-labelledby="validationModalLabel"  aria-hidden="true"> 
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Please fill out all required fields correctly before submitting your task.
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Validation logic
        const form = document.getElementById('taskForm');
        const modal = new bootstrap.Modal(document.getElementById('validationModal'));

        form.addEventListener('submit', function (event) {
            // Check if the form is valid according to 'required' attributes
            if (!form.checkValidity()) {
                event.preventDefault(); // Prevents the form from submitting
                event.stopPropagation();
                modal.show(); // Shows the pop-up modal
            }
            
            form.classList.add('was-validated');
        }, false);
    </script>
</body>
</html>
