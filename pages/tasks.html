<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADHD Tracker - My Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f8f9fa; 
        }
        .task-container { 
            max-width: 800px; 
            margin: 2rem auto; 
        }
        /* Custom border accents for priority levels */
        .priority-low { border-left: 6px solid #198754; } 
        .priority-medium { border-left: 6px solid #fd7e14; } 
        .priority-high { border-left: 6px solid #dc3545; } 

        main {
            padding-top: 20px;
        }
    </style>
</head>
<body>

  <div id="navbar"></div>

<script>
    fetch("./navigation/navbar.html")
        .then(res => res.text())
        .then(data => {
            document.getElementById("navbar").innerHTML = data;
        });
</script>

    <main class="container task-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">MY TASKS</h2>
            <a href="newtasks.html" class="btn btn-secondary px-4">+ Add New</a>
        </div>

        <div class="list-group shadow-sm">
            
            <div class="list-group-item list-group-item-action p-3 mb-2 rounded border priority-high">
                <div class="d-flex w-100 justify-content-between align-items-center">
                    <div>
                        <h5 class="mb-1 fw-bold text-dark">Finish Coding Project</h5>
                        <p class="mb-1 text-muted"><small>Due: 05-21-26</small></p>
                        <span class="badge bg-danger">High Priority</span>
                    </div>
                    <button class="btn btn-outline-danger btn-sm rounded-pill px-3">Delete</button>
                </div>
            </div>

            <div class="list-group-item list-group-item-action p-3 mb-2 rounded border priority-medium">
                <div class="d-flex w-100 justify-content-between align-items-center">
                    <div>
                        <h5 class="mb-1 fw-bold text-dark">Laundry</h5>
                        <p class="mb-1 text-muted"><small>Due: 05-21-26</small></p>
                        <span class="badge bg-warning text-dark">Medium Priority</span>
                    </div>
                    <button class="btn btn-outline-danger btn-sm rounded-pill px-3">Delete</button>
                </div>
            </div>

            <div class="list-group-item list-group-item-action p-3 mb-2 rounded border priority-low">
                <div class="d-flex w-100 justify-content-between align-items-center">
                    <div>
                        <h5 class="mb-1 fw-bold text-dark">Water Plants</h5>
                        <p class="mb-1 text-muted"><small>Due: 05-21-26</small></p>
                        <span class="badge bg-success">Low Priority</span>
                    </div>
                    <button class="btn btn-outline-danger btn-sm rounded-pill px-3">Delete</button>
                </div>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
